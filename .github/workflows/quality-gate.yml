name: Quality Gate

on:
  pull_request:
  push:
    branches: [main, master]

# Lightweight smoke only: full lint/test/format lives in each repo's primary CI
# (ci.yml, etc.). This workflow avoids duplicating heavy checks and queueing
# redundant work across the org.
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify workflow definitions exist
        run: |
          set -euo pipefail
          if [ ! -d .github/workflows ]; then
            echo "::error::Missing .github/workflows"
            exit 1
          fi
          n=$(find .github/workflows -type f \( -name '*.yml' -o -name '*.yaml' \) | wc -l | tr -d ' ')
          if [ "${n:-0}" -eq 0 ]; then
            echo "::error::No workflow YAML files under .github/workflows"
            exit 1
          fi
          echo "OK: ${n} workflow file(s) present. Primary CI runs in dedicated workflows."
