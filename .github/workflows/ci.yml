name: sc-transport CI

on: [push, pull_request]

jobs:
  build:
    if: github.actor != 'dependabot[bot]'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt
      - run: cargo build --workspace --all-features
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-features -- -D warnings
      - run: cargo fmt --all -- --check

  test-transport-core:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p sc-transport-core
      - run: cargo test -p sc-transport-quic --features quic-streams

  test-integration:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --test sse_basic
      - run: cargo test --features transport-quic --test quic_stream_basic
      - run: cargo test --features "transport-quic transport-datagrams" --test transport_transparency

  test-prompt5-sct-core:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p sct-core --test prompt5_integration
      - run: cargo test -p sct-core --test transfer_smoke

  test-sct-rucio-plugin:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install plugin test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./sct-rucio
          python -m pip install -r ./sct-rucio/requirements-dev.txt
      - name: Run pytest for sct-rucio
        run: python -m pytest ./sct-rucio/tests --maxfail=1 --disable-warnings --junitxml=sct-rucio-pytest.xml
      - name: Upload sct-rucio pytest report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sct-rucio-pytest-report
          path: sct-rucio-pytest.xml
