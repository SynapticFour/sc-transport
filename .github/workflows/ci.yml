name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy -p sct-core -p sct-proto --all-targets --all-features -- -D warnings

      - name: Unit tests (lib)
        run: cargo test --package sct-core --lib

      - name: Integration tests (serial QUIC loopback)
        run: |
          export RUST_TEST_THREADS=1
          for t in completion_campaign completion_first_ab delta_transfer transfer_smoke \
            e2e_loopback fec_recovery prompt5_integration; do
            echo "==> sct-core --test $t"
            features=
            [ "$t" = e2e_loopback ] && features="--features test-hooks"
            cargo test --package sct-core --test "$t" $features -- --test-threads=1
          done

      - name: cf-check (completion_first regression)
        run: |
          SC_TRANSPORT_ARTIFACT_DIR=/tmp/cf-check \
            cargo test --package sct-core --test completion_campaign completion_campaign_metrics -- --exact
          p99=$(jq .p99_completion_ms /tmp/cf-check/completion-campaign-summary.json)
          echo "cf-check p99=${p99}ms"
          python3 -c "assert ${p99} < 5.0, f'cf-check p99 regression: {${p99}}ms >= 5ms'"

      - name: Proto tests
        run: cargo test --package sct-proto

  # Mirrors `make ci-transport-integration` (see README § Continuous integration).
  workspace-integration:
    name: sc-transport integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Clippy (transport workspace)
        run: |
          cargo clippy -p sc-transport -p sc-transport-core -p sc-transport-quic \
            -p sc-transport-sse -p sc-transport-datagrams \
            --all-targets --features transport-quic,transport-datagrams -- -D warnings

      - name: Unit tests (transport crates)
        run: |
          cargo test -p sc-transport-core
          cargo test -p sc-transport-quic --features quic-streams
          cargo test -p sc-transport-sse
          cargo test -p sc-transport-datagrams --features quic-datagrams

      - name: Integration tests (streaming_matrix + transports)
        run: bash scripts/ci-transport-integration.sh

      - name: CLI and daemon smoke tests
        run: bash scripts/ci-cli-daemon-smoke.sh
