name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
jobs:
  test:
    name: sct-core + proto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy -p sct-core -p sct-proto --all-targets --all-features -- -D warnings
      - run: cargo test --package sct-core --lib
      - run: cargo test --package sct-core --test completion_campaign
      - run: cargo test --package sct-core --test completion_first_ab
      - run: cargo test --package sct-core --test fec_recovery
      - run: cargo test --package sct-core --test delta_transfer
      - run: cargo test --package sct-core --test transfer_smoke
      - run: cargo test --package sct-core --test e2e_loopback --features test-hooks
      - run: cargo test --package sct-proto
      - name: cf-check regression gate (p99 < 5ms)
        run: |
          mkdir -p /tmp/cf-check
          SC_TRANSPORT_ARTIFACT_DIR=/tmp/cf-check \
            cargo test --package sct-core --test completion_campaign \
            completion_campaign_metrics -- --exact --nocapture
          P99=$(python3 -c "
          import json
          d = json.load(open('/tmp/cf-check/completion-campaign-summary.json'))
          print(d['p99_completion_ms'])
          ")
          echo "cf-check p99=${P99}ms"
          export P99
          python3 -c "
          import os
          p99 = float(os.environ['P99'])
          assert p99 < 5.0, f'REGRESSION: cf-check p99={p99:.3f}ms >= 5ms'
          print(f'OK: p99={p99:.4f}ms')
          "

  workspace-integration:
    name: Transport workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: bash scripts/ci-transport-integration.sh
      - run: bash scripts/ci-cli-daemon-smoke.sh
