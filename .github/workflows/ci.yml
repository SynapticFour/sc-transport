name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_TEST_THREADS: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all -- --check
      - run: cargo clippy -p sct-core -p sct-proto --all-targets --features test-hooks -- -D warnings
      - run: cargo test --package sct-proto
      - run: cargo test --package sct-core --lib
      - run: cargo test --package sct-core --test completion_campaign
      - run: cargo test --package sct-core --test completion_first_ab
      - run: cargo test --package sct-core --test fec_recovery
      - run: cargo test --package sct-core --test delta_transfer
      - run: cargo test --package sct-core --test transfer_smoke
      - run: cargo test --package sct-core --test prompt5_integration
      - run: cargo test --package sct-core --test e2e_loopback --features test-hooks

      - name: cf-check regression gate
        run: |
          mkdir -p /tmp/cf-check
          SC_TRANSPORT_ARTIFACT_DIR=/tmp/cf-check \
            cargo test --package sct-core --test completion_campaign \
            completion_campaign_metrics -- --exact --nocapture
          P99=$(python3 -c "import json; \
            print(json.load(open('/tmp/cf-check/completion-campaign-summary.json'))['p99_completion_ms'])")
          echo "cf-check p99=${P99}ms"
          python3 -c "assert ${P99} < 5.0, f'Regression: p99=${P99}ms >= 5ms'"

  # Mirrors `make ci-transport-integration` (see README § Continuous integration).
  workspace-integration:
    name: sc-transport integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Clippy (transport workspace)
        run: |
          cargo clippy -p sc-transport -p sc-transport-core -p sc-transport-quic \
            -p sc-transport-sse -p sc-transport-datagrams \
            --all-targets --features transport-quic,transport-datagrams -- -D warnings

      - name: Unit tests (transport crates)
        run: |
          cargo test -p sc-transport-core
          cargo test -p sc-transport-quic --features quic-streams
          cargo test -p sc-transport-sse
          cargo test -p sc-transport-datagrams --features quic-datagrams

      - name: Integration tests (streaming_matrix + transports)
        run: bash scripts/ci-transport-integration.sh

      - name: CLI and daemon smoke tests
        run: bash scripts/ci-cli-daemon-smoke.sh
