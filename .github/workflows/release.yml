name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set release version
        run: |
          echo "SCT_RELEASE_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "SCT_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sct-daemon image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/synapticfour/sct-daemon:${{ env.SCT_RELEASE_VERSION }}
            ghcr.io/synapticfour/sct-daemon:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build offline bundle
        env:
          SCT_RELEASE_VERSION: ${{ env.SCT_RELEASE_VERSION }}
        run: |
          chmod +x scripts/package_release_bundle.sh scripts/export_offline_bundle.sh import.sh install.sh
          ./scripts/package_release_bundle.sh

      - name: Generate SHA256SUMS
        run: |
          shasum -a 256 sc-transport-offline-*.tar.gz install.sh import.sh sct.toml.example > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            sc-transport-offline-*.tar.gz
            SHA256SUMS.txt
            install.sh
            import.sh
            sct.toml.example
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
