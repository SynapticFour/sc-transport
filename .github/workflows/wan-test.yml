name: WAN Test (AWS EC2 — Activate Credits)

# Disabled until AWS credentials are configured. Run manually via workflow_dispatch when ready.
# Required secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, SCT_WAN_SSH_PRIVATE_KEY
on:
  workflow_dispatch:

jobs:
  wan-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-central-1

      - name: Start Instances
        run: bash infra/aws/start_wan_test.sh

      - name: Wait for Ready (max 5 min)
        run: |
          SENDER_ID=$(grep eu-central-1 /tmp/sct-wan-instances.txt | cut -d' ' -f1)
          for i in $(seq 1 30); do
            STATE=$(aws ec2 describe-instances --region eu-central-1 \
                --instance-ids $SENDER_ID \
                --query 'Reservations[0].Instances[0].State.Name' --output text)
            [ "$STATE" = "running" ] && echo "Ready!" && break
            sleep 10
          done

      - name: Run Transfer Test
        env:
          SCT_WAN_SSH_PRIVATE_KEY: ${{ secrets.SCT_WAN_SSH_PRIVATE_KEY }}
        run: bash infra/aws/run_test.sh

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: wan-results-${{ github.run_id }}
          path: wan-results/

      - name: Teardown (always)
        if: always()
        run: bash infra/aws/teardown.sh

    # Secrets needed (Settings → Secrets → Actions):
    # AWS_ACCESS_KEY_ID        — IAM User mit EC2 Rechten
    # AWS_SECRET_ACCESS_KEY    — dazu passend
    # SCT_WAN_SSH_PRIVATE_KEY  — privater Schlüssel zu EC2 Key Pair sct-wan-key
