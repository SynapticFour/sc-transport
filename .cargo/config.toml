# From repo root: `cargo test-sct-core` runs all sct-core integration binaries sequentially
# (avoids QUIC/localhost contention when many `tests/*.rs` run in parallel).
[alias]
test-sct-core = "test -p sct-core --tests -- --test-threads=1"

[target.aarch64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=cortex-a76",
    "-C", "target-feature=+neon,+aes,+sha2,+crc",
]

[target.aarch64-apple-darwin]
rustflags = [
    "-C", "target-cpu=apple-m1",
    "-C", "target-feature=+neon,+aes,+sha2,+sha3,+crc",
]

[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=x86-64-v3",
    "-C", "target-feature=+aes,+sse4.2,+avx,+avx2",
]

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "debuginfo"
