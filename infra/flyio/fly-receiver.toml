app = "sct-wan-receiver"
primary_region = "iad"  # Ashburn, US East

[build]
  dockerfile = "infra/flyio/Dockerfile.sct"

[http_service]
  internal_port = 9410
  force_https = false
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 512
