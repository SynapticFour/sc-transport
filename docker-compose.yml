# Build image first: docker build -t sct-daemon:latest .
# Or: docker compose build
services:
  sct-daemon:
    build: .
    image: sct-daemon:latest
    ports:
      - "7272:7272"
      - "7273:7273"
      - "9090:9090"
    volumes:
      - /data:/data
      - ./sct.toml:/etc/sct/sct.toml
    environment:
      - RUST_LOG=info
